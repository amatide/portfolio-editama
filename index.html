<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0;url=https://editama.my.id/id/" />
  <title>Editama Mufti Islahuddin – Health Information Professional</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/id/favicon.png" />
  <link rel="icon" type="image/x-icon" href="/id/favicon.ico" />
  <link rel="apple-touch-icon" href="/id/apple-touch-icon.png" />

  <!-- Prevent search indexing on redirect page -->
  <meta name="robots" content="noindex, nofollow" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060d1a;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 40px rgba(6, 182, 212, 0.3);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #f8fafc;
      text-align: center;
    }

    p.sub {
      font-size: 0.95rem;
      color: #94a3b8;
      text-align: center;
      max-width: 380px;
      line-height: 1.6;
    }

    .lang-select {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 0.5rem;
    }

    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(6, 182, 212, 0.1);
      border: 1px solid rgba(6, 182, 212, 0.3);
      border-radius: 8px;
      color: #06b6d4;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .lang-btn:hover {
      background: rgba(6, 182, 212, 0.2);
      border-color: rgba(6, 182, 212, 0.6);
      transform: translateY(-1px);
    }

    .lang-btn en { color: #60a5fa; }
    .lang-btn id { color: #06b6d4; }

    .note {
      font-size: 0.8rem;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="logo">EMI</div>
  <h1>Editama Mufti Islahuddin</h1>
  <p class="sub">Health Information Professional · Tech Enthusiast · Digital Health Explorer</p>

  <div class="lang-select">
    <a href="https://editama.my.id/id/" class="lang-btn id">
      🇮🇩 Indonesia
    </a>
    <a href="https://editama.my.id/en/" class="lang-btn en">
      🇬🇧 English
    </a>
  </div>

  <p class="note">Mengalihkan… atau pilih bahasa di atas.</p>

</body>
</html>
